name: Compile RodowódOS Pipeline

on:
  workflow_dispatch:

jobs:
  build_rom:
    runs-on: ubuntu-latest
    container:
      image: debian:buster
    steps:
      - name: Setup Debian Environment
        run: |
          echo "deb http://archive.debian.org/debian/ buster main contrib non-free" > /etc/apt/sources.list
          echo "deb http://archive.debian.org/debian-security/ buster/updates main contrib non-free" >> /etc/apt/sources.list
          echo 'Acquire::Check-Valid-Until "false";' > /etc/apt/apt.conf.d/99no-check-valid-until
          apt-get update
          apt-get install -y git git-lfs curl sudo procps bc bison build-essential \
            ccache curl flex g++-multilib gcc-multilib gnupg gperf lib32readline-dev \
            lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libssl-dev \
            libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools \
            xsltproc zip zlib1g-dev openjdk-11-jdk python3

      - name: Configure Environment
        run: |
          sudo ln -s /usr/bin/python3 /usr/bin/python
          git config --global user.name "MatispokoYT"
          git config --global user.email "dorosmateusz@gmail.com"
          git config --global --add safe.directory '*'
          curl https://storage.googleapis.com/git-repo-downloads/repo-1 > /usr/local/bin/repo
          chmod a+x /usr/local/bin/repo

      - name: Fetch Android Source
        run: |
          mkdir -p $GITHUB_WORKSPACE/android/lineage
          cd $GITHUB_WORKSPACE/android/lineage
          repo init --repo-url=https://gerrit.googlesource.com/git-repo -u https://github.com/LineageOS/android.git -b lineage-16.0 --depth=1 --no-repo-verify
          
          mkdir -p .repo/local_manifests
          cat <<EOF > .repo/local_manifests/agassi2.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <project name="MatispokoYT/device_huawei_agassi2" path="device/huawei/prague" remote="github" revision="aosp-9.0" />
            <project name="DarkJoker360/android_kernel_huawei_alice" path="kernel/huawei/hi6250" remote="github" revision="lineage-15.1" />
            <project name="DarkJoker360/proprietary_vendor_huawei_prague" path="vendor/huawei/prague" remote="github" revision="lineage-15.1" />
          </manifest>
          EOF
          repo sync -c -j$(nproc --all) --force-sync

      - name: Compile OS
        shell: bash
        run: |
          cd $GITHUB_WORKSPACE/android/lineage
          source build/envsetup.sh
          lunch aosp_agassi2-userdebug
          make api-stubs-docs || true
          make systemimage userdataimage bootimage-nodeps -j$(nproc --all)

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RodowodOS-Build
          path: ${{ github.workspace }}/android/lineage/out/target/product/agassi2/*.zip
